<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Authority Matrix</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm">
    <h1 class="text-xl font-semibold text-center mb-6">Authority Matrix</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mb-4 space-y-2">
          {% for category, message in messages %}
            <div class="rounded-md px-4 py-2 text-sm border {{ 'bg-green-50 text-green-700 border-green-200' if category == 'success' else 'bg-red-50 text-red-700 border-red-200' }}">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="post" class="bg-white border border-gray-200 rounded-lg p-6 space-y-4">
      <input type="hidden" name="next" value="{{ next }}">
      <div>
        <label class="block text-sm font-medium mb-1">Email</label>
        <input type="email" name="email" required autofocus value="{{ email }}"
               class="w-full border border-gray-300 rounded-md px-3 py-1.5 text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Password</label>
        <input type="password" name="password" required
               class="w-full border border-gray-300 rounded-md px-3 py-1.5 text-sm">
      </div>
      <button type="submit" class="w-full bg-gray-900 text-white text-sm px-4 py-2 rounded-md hover:bg-gray-800">
        Login
      </button>
    </form>
  </div>
</body>
</html>
