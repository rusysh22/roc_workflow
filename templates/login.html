<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Authority Matrix</title>
  <style>
    /*=============== VARIABLES ===============*/
    :root {
      --white-color: hsl(0, 0%, 100%);
      --black-color: hsl(0, 0%, 0%);
      --body-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --h1-font-size: 1.5rem;
      --normal-font-size: 1rem;
      --small-font-size: .813rem;
    }

    /*=============== BASE ===============*/
    * { box-sizing: border-box; padding: 0; margin: 0; }
    body, input, button { font-family: var(--body-font); font-size: var(--normal-font-size); }
    img { display: block; max-width: 100%; height: auto; }

    /*=============== LOGIN ===============*/
    .login {
      position: relative;
      min-height: 100vh;
      display: grid;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      overflow: hidden;
    }

    /* Brand-colored backdrop (sampled from the Interport logo) standing in
       for bedimcode's photo background, so the page has no external asset. */
    .login__bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 15% 20%, hsla(200, 70%, 55%, .35), transparent 45%),
        radial-gradient(circle at 85% 75%, hsla(100, 40%, 45%, .30), transparent 45%),
        linear-gradient(135deg, #05263d 0%, #0b3d5c 35%, #0084ae 70%, #34b0e1 100%);
    }

    .login__form {
      position: relative;
      width: 100%;
      max-width: 380px;
      background-color: hsla(0, 0%, 100%, .08);
      border: 1px solid hsla(0, 0%, 100%, .35);
      padding: 2.25rem 2rem;
      color: var(--white-color);
      border-radius: 1.25rem;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 8px 32px hsla(0, 0%, 0%, .25);
    }

    .login__logo-wrap {
      background-color: hsla(0, 0%, 100%, .92);
      border-radius: .9rem;
      padding: .9rem 1.25rem;
      margin: 0 auto 1.5rem;
      max-width: 220px;
    }

    .login__logo { width: 100%; }

    .login__title {
      text-align: center;
      font-size: var(--h1-font-size);
      font-weight: 600;
      margin-bottom: 1.5rem;
    }

    .login__message {
      font-size: var(--small-font-size);
      padding: .6rem .9rem;
      border-radius: .6rem;
      margin-bottom: 1rem;
      border: 1px solid hsla(0, 0%, 100%, .35);
    }
    .login__message--error { background: hsla(0, 70%, 50%, .25); }
    .login__message--success { background: hsla(140, 60%, 45%, .25); }

    .login__inputs { display: grid; row-gap: 1.1rem; margin-bottom: 1.25rem; }

    .login__box {
      display: grid;
      grid-template-columns: max-content 1fr;
      column-gap: .75rem;
      align-items: center;
      border: 2px solid hsla(0, 0%, 100%, .5);
      padding-inline: 1.1rem;
      border-radius: 4rem;
      overflow: hidden;
    }
    .login__box:focus-within { border-color: hsla(0, 0%, 100%, .9); }

    .login__box svg { width: 1.1rem; height: 1.1rem; flex-shrink: 0; opacity: .85; }

    .login__input {
      width: 100%;
      background: none;
      border: none;
      outline: none;
      color: var(--white-color);
      padding-block: .9rem;
    }
    .login__input::placeholder { color: hsla(0, 0%, 100%, .75); }
    
    /* Chrome Autofill fix */
    .login__input:-webkit-autofill,
    .login__input:-webkit-autofill:hover, 
    .login__input:-webkit-autofill:focus, 
    .login__input:-webkit-autofill:active {
      transition: background-color 5000s ease-in-out 0s;
      -webkit-text-fill-color: var(--white-color) !important;
    }

    .login__button {
      width: 100%;
      padding: .9rem;
      border: none;
      outline: none;
      background-color: var(--white-color);
      border-radius: 4rem;
      color: #0b3d5c;
      font-weight: 600;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .login__button:hover { box-shadow: 0 4px 14px hsla(0, 0%, 0%, .25); transform: translateY(-1px); }

    @media screen and (min-width: 576px) {
      .login__form { padding: 2.75rem 2.5rem; }
    }
  </style>
</head>
<body>
  <div class="login">
    <div class="login__bg"></div>

    <form method="post" class="login__form">
      <div class="login__logo-wrap">
        <img src="{{ url_for('static', filename='img/logo-interport.webp') }}" alt="Interport" class="login__logo">
      </div>
      <h1 class="login__title">Authority Matrix</h1>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="login__message login__message--{{ 'error' if category == 'error' else 'success' }}">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <input type="hidden" name="next" value="{{ next }}">

      <div class="login__inputs">
        <div class="login__box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z" opacity="0"/><path d="M22 6 12 13 2 6"/><path d="M2 6h20v12H2z"/></svg>
          <input type="email" name="email" placeholder="Email" required autofocus value="{{ email }}" class="login__input">
        </div>

        <div class="login__box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
          <input type="password" name="password" placeholder="Password" required class="login__input">
        </div>
      </div>

      <button type="submit" class="login__button">Login</button>

      <div style="text-align: center; margin: 1.25rem 0; font-size: 0.8rem; color: hsla(0, 0%, 100%, .7); display: flex; align-items: center; gap: 0.5rem;">
        <div style="flex: 1; height: 1px; background: hsla(0, 0%, 100%, .2);"></div>
        Or
        <div style="flex: 1; height: 1px; background: hsla(0, 0%, 100%, .2);"></div>
      </div>
      
      <a href="{{ url_for('login_microsoft') }}" class="login__button" style="display: flex; align-items: center; justify-content: center; gap: 0.6rem; text-decoration: none; background-color: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.4); color: white;">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 21 21"><path fill="#f3f3f3" d="M10 0H0v10h10V0zM21 0H11v10h10V0zM10 11H0v10h10V11zm11 0H11v10h10V11z"/></svg>
        Sign in with Microsoft
      </a>
    </form>
  </div>
</body>
</html>
