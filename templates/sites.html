{% extends "base.html" %}
{% block title %}Sites{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-4">
  <h1 class="text-xl font-semibold">Sites</h1>
  <a href="{{ url_for('new_site') }}"
     class="bg-gray-900 text-white text-sm px-4 py-2 rounded-md hover:bg-gray-800">+ Add Site</a>
</div>

<div class="overflow-x-auto border border-gray-200 rounded-lg bg-white p-4">
  <table id="sitesTable" class="min-w-full text-sm">
    <thead class="bg-gray-100 text-left text-gray-600">
      <tr>
        <th class="px-4 py-2">Entity</th>
        <th class="px-4 py-2">Site Name</th>
        <th class="px-4 py-2"></th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-100">
      {% for s in sites %}
      <tr>
        <td class="px-4 py-2 font-medium">
          <span class="inline-block px-2 py-0.5 rounded-full text-xs font-medium {{ entity_badge_class(s.entity_code) }}">{{ s.entity_code }}</span>
        </td>
        <td class="px-4 py-2">
          <span class="inline-block px-2 py-0.5 rounded-full text-xs font-medium {{ string_badge_class(s.name) }}">{{ s.name }}</span>
        </td>
        <td class="px-4 py-2 text-right whitespace-nowrap">
          <a href="{{ url_for('edit_site', site_id=s.id) }}" class="text-gray-500 hover:text-gray-900">Edit</a>
          <form method="post" action="{{ url_for('delete_site', site_id=s.id) }}" class="inline" onsubmit="return confirm('Delete this site? This will fail if there are related assignments.')">
            <button type="submit" class="text-red-500 hover:text-red-700 ml-3">Delete</button>
          </form>
        </td>
      </tr>
      {% else %}
      <tr>
        <td colspan="3" class="px-4 py-6 text-center text-gray-400">No sites found.</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<style>
  .dataTables_wrapper .dataTables_length select { border: 1px solid #aaa; border-radius: 3px; padding: 4px; background-color: transparent; }
  .dataTables_wrapper .dataTables_filter input { border: 1px solid #aaa; border-radius: 3px; padding: 4px; background-color: transparent; margin-left: 3px; }
  .dataTables_wrapper { padding-top: 0.5rem; }
  table.dataTable thead th, table.dataTable thead td { border-bottom: 1px solid #e5e7eb; }
  table.dataTable.no-footer { border-bottom: 1px solid #e5e7eb; }
  .filters input { width: 100%; padding: 2px 4px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; font-weight: normal; }
</style>
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script>
$(document).ready(function() {
    $('#sitesTable thead tr').clone(true).addClass('filters').appendTo('#sitesTable thead');
    var table = $('#sitesTable').DataTable({
        orderCellsTop: true,
        fixedHeader: true,
        pageLength: 50,
        lengthMenu: [ [10, 25, 50, 100, -1], [10, 25, 50, 100, "All"] ],
        initComplete: function () {
            var api = this.api();
            api.columns().eq(0).each(function (colIdx) {
                var cell = $('.filters th').eq($(api.column(colIdx).header()).index());
                var title = $(cell).text().trim();
                if(colIdx === 2) { $(cell).html(''); return; }
                $(cell).html('<input type="text" placeholder="Filter ' + title + '" />');
                $('input', $('.filters th').eq($(api.column(colIdx).header()).index()))
                    .off('keyup change').on('keyup change', function (e) {
                        e.stopPropagation();
                        $(this).attr('title', $(this).val());
                        var regexr = '({search})';
                        api.column(colIdx).search(
                            this.value != '' ? regexr.replace('{search}', '(((' + this.value + ')))') : '',
                            this.value != '', this.value == ''
                        ).draw();
                    }).on('click', function (e) { e.stopPropagation(); });
            });
        },
    });
});
</script>
{% endblock %}
