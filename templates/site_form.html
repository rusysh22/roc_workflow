{% extends "base.html" %}
{% block title %}{{ 'Edit Site' if mode == 'edit' else 'New Site' }}{% endblock %}
{% block content %}
<div class="mb-4">
  <a href="{{ url_for('sites_list') }}" class="text-sm text-gray-500 hover:text-gray-900">&larr; Back to Sites</a>
</div>

<h1 class="text-xl font-semibold mb-6">{{ 'Edit Site' if mode == 'edit' else 'New Site' }}</h1>

<form method="post" class="bg-white border border-gray-200 rounded-lg p-6 max-w-lg">
  <div class="mb-4">
    <label class="block text-sm font-medium text-gray-700 mb-1">Entity (Multiple allowed)</label>
    <select name="entity_id" multiple required class="searchable-select w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-gray-900">
      {% for e in entities %}
      <option value="{{ e.id }}" {% if site_entities and e.id in site_entities %}selected{% endif %}>{{ e.code }} - {{ e.name }}</option>
      {% endfor %}
    </select>
  </div>
  
  <div class="mb-6">
    <label class="block text-sm font-medium text-gray-700 mb-1">Site Name</label>
    <input type="text" name="name" value="{{ site.name if site else '' }}" required
           class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-gray-900">
  </div>

  <div class="flex justify-end gap-3">
    <a href="{{ url_for('sites_list') }}" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-900">Cancel</a>
    <button type="submit" class="bg-gray-900 text-white text-sm px-4 py-2 rounded-md hover:bg-gray-800">
      {{ 'Save Changes' if mode == 'edit' else 'Create Site' }}
    </button>
  </div>
</form>
{% include 'select2_form_init.html' %}
{% endblock %}
