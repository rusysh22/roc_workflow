{% extends "base.html" %}
{% block title %}{{ 'Edit Entity' if mode == 'edit' else 'New Entity' }}{% endblock %}
{% block content %}
<div class="mb-4">
  <a href="{{ url_for('entities_list') }}" class="text-sm text-gray-500 hover:text-gray-900">&larr; Back to Entities</a>
</div>

<h1 class="text-xl font-semibold mb-6">{{ 'Edit Entity' if mode == 'edit' else 'New Entity' }}</h1>

<form method="post" class="bg-white border border-gray-200 rounded-lg p-6 max-w-lg">
  <div class="mb-4">
    <label class="block text-sm font-medium text-gray-700 mb-1">Code</label>
    <input type="text" name="code" value="{{ entity.code if entity else '' }}" required
           class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-gray-900">
    <p class="text-xs text-gray-500 mt-1">Example: IMU</p>
  </div>
  
  <div class="mb-4">
    <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
    <input type="text" name="name" value="{{ entity.name if entity else '' }}" required
           class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-gray-900">
  </div>

  <div class="mb-6">
    <label class="block text-sm font-medium text-gray-700 mb-1">Exchange Rate (IDR to USD)</label>
    <input type="number" step="0.01" name="exchange_rate_idr" value="{{ entity.exchange_rate_idr if entity else '16000.00' }}" required
           class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-gray-900">
  </div>

  <div class="mb-6">
    <label class="block text-sm font-medium text-gray-700 mb-1">Sites (Bisa lebih dari satu)</label>
    <select name="site_id" multiple class="searchable-select w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-gray-900">
      {% for s in sites %}
      <option value="{{ s.id }}" {% if entity_sites and s.id in entity_sites %}selected{% endif %}>{{ s.name }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="flex justify-end gap-3">
    <a href="{{ url_for('entities_list') }}" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-900">Cancel</a>
    <button type="submit" class="bg-gray-900 text-white text-sm px-4 py-2 rounded-md hover:bg-gray-800">
      {{ 'Save Changes' if mode == 'edit' else 'Create Entity' }}
    </button>
  </div>
</form>
{% include 'select2_form_init.html' %}
{% endblock %}
