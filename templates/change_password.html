{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block content %}
<h1 class="text-xl font-semibold mb-4">Change Password</h1>

{% if forced %}
<div class="mb-4 rounded-md px-4 py-2 text-sm border bg-amber-50 text-amber-700 border-amber-200">
  This is the default password. Please set a new password before continuing.
</div>
{% endif %}

<form method="post" class="space-y-4 max-w-sm">
  <div>
    <label class="block text-sm font-medium mb-1">Current Password</label>
    <input type="password" name="current_password" required
           class="w-full border border-gray-300 rounded-md px-3 py-1.5 text-sm">
  </div>
  <div>
    <label class="block text-sm font-medium mb-1">New Password</label>
    <input type="password" name="new_password" required minlength="8"
           class="w-full border border-gray-300 rounded-md px-3 py-1.5 text-sm">
    <p class="text-xs text-gray-500 mt-1">Minimum 8 characters.</p>
  </div>
  <div>
    <label class="block text-sm font-medium mb-1">Confirm New Password</label>
    <input type="password" name="confirm_password" required minlength="8"
           class="w-full border border-gray-300 rounded-md px-3 py-1.5 text-sm">
  </div>
  <div class="flex gap-3 pt-2">
    <button type="submit" class="bg-gray-900 text-white text-sm px-4 py-2 rounded-md hover:bg-gray-800">
      Save Password
    </button>
    {% if not forced %}
      <a href="{{ url_for('workpapers') if session.get('role') == 'portal_user' else url_for('home') }}" class="text-sm text-gray-500 px-4 py-2 hover:text-gray-800">Cancel</a>
    {% endif %}
  </div>
</form>
{% endblock %}
