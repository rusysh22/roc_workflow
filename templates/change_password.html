{% extends "base.html" %}
{% block title %}Ganti Password{% endblock %}
{% block content %}
<h1 class="text-xl font-semibold mb-4">Ganti Password</h1>

{% if forced %}
<div class="mb-4 rounded-md px-4 py-2 text-sm border bg-amber-50 text-amber-700 border-amber-200">
  Ini password default. Silakan buat password baru sebelum melanjutkan.
</div>
{% endif %}

<form method="post" class="space-y-4 max-w-sm">
  <div>
    <label class="block text-sm font-medium mb-1">Password Saat Ini</label>
    <input type="password" name="current_password" required
           class="w-full border border-gray-300 rounded-md px-3 py-1.5 text-sm">
  </div>
  <div>
    <label class="block text-sm font-medium mb-1">Password Baru</label>
    <input type="password" name="new_password" required minlength="8"
           class="w-full border border-gray-300 rounded-md px-3 py-1.5 text-sm">
    <p class="text-xs text-gray-500 mt-1">Minimal 8 karakter.</p>
  </div>
  <div>
    <label class="block text-sm font-medium mb-1">Konfirmasi Password Baru</label>
    <input type="password" name="confirm_password" required minlength="8"
           class="w-full border border-gray-300 rounded-md px-3 py-1.5 text-sm">
  </div>
  <div class="flex gap-3 pt-2">
    <button type="submit" class="bg-gray-900 text-white text-sm px-4 py-2 rounded-md hover:bg-gray-800">
      Simpan Password
    </button>
    {% if not forced %}
      <a href="{{ url_for('home') }}" class="text-sm text-gray-500 px-4 py-2 hover:text-gray-800">Batal</a>
    {% endif %}
  </div>
</form>
{% endblock %}
