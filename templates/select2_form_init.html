{# Reusable snippet: include at the bottom of any form to enable
   Select2 searchable dropdown on all <select class="searchable-select"> elements. #}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<style>
  /* Match Tailwind form field aesthetics */
  .select2-container--default .select2-selection--single {
    height: 38px;
    border: 1px solid #d1d5db;
    border-radius: 0.375rem;
    padding: 0 0.75rem;
    display: flex;
    align-items: center;
    background-color: #fff;
    font-size: 0.875rem;
    color: #111827;
    transition: border-color 0.15s;
  }
  .select2-container--default .select2-selection--single:focus,
  .select2-container--default.select2-container--focus .select2-selection--single {
    outline: none;
    border-color: #111827;
    box-shadow: 0 0 0 1px #111827;
  }
  .select2-container--default .select2-selection--single .select2-selection__rendered {
    padding: 0 40px 0 0;
    line-height: normal;
    color: #111827;
    font-size: 0.875rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .select2-container--default .select2-selection--single .select2-selection__clear {
    margin-right: 30px;
    font-size: 1.25rem;
    line-height: 1;
    color: #9ca3af;
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
  }
  .select2-container--default .select2-selection--single .select2-selection__clear:hover {
    color: #4b5563;
  }
  .select2-container--default .select2-selection--single .select2-selection__placeholder {
    color: #9ca3af;
  }
  .select2-container--default .select2-selection--single .select2-selection__arrow {
    height: 36px;
    right: 8px;
  }
  .select2-container--default .select2-results__option--highlighted[aria-selected] {
    background-color: #f3f4f6;
    color: #111827;
  }
  .select2-container--default .select2-results__option[aria-selected=true] {
    background-color: #e5e7eb;
    color: #111827;
  }
  .select2-dropdown {
    border: 1px solid #d1d5db;
    border-radius: 0.375rem;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,.07);
    font-size: 0.875rem;
  }
  .select2-container--default .select2-search--dropdown .select2-search__field {
    border: 1px solid #d1d5db;
    border-radius: 0.25rem;
    padding: 0.375rem 0.5rem;
    font-size: 0.8125rem;
    outline: none;
  }
  .select2-container--default .select2-search--dropdown .select2-search__field:focus {
    border-color: #111827;
  }
  /* Disabled state */
  .select2-container--default.select2-container--disabled .select2-selection--single {
    background-color: #f3f4f6;
    cursor: not-allowed;
  }
</style>
<script>
$(document).ready(function() {
  $('select.searchable-select').each(function() {
    if ($(this).data('select2')) return; // already initialized, skip
    var $sel = $(this);
    var placeholder = $sel.find('option[value=""]').text() || 'Search...';
    $sel.select2({
      width: '100%',
      placeholder: placeholder,
      allowClear: true,
      dropdownAutoWidth: false,
    });
  });
});
</script>
